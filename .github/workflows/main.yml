name: main

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create release + upload assets
  packages: write   # pull and push images

jobs:
  build-image:
    runs-on: ubuntu-latest

    #container:
    #  image: ghcr.io/${{ github.repository }}:main
    #  options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mark repo as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image if needed
        run: |
          ./scripts/gh.sh build_image_if_needed ghcr.io/${{ github.repository }}:main

  build-packages:
    runs-on: ubuntu-latest
    needs: build-image

    container:
      image: ghcr.io/${{ github.repository }}:main
      # typically only SYS_ADMIN capability is needed
      # for overlayfs, but on github's docker for some reason
      # full on --privileged is required
      options: --user root --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mark repo as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache built packages
        id: cache-pkgs
        uses: actions/cache@v4
        env:
          cache-name: cache-pkgs
        with:
          path: ./upper/hostdir/binpkgs/
          # the hashFiles is relative to repo root I think????
          # so need **/*.xbps instead of plain *.xbps
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/*.xbps') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Build packages
        run: |
          # Shallow clone is faster
          export GIT_CLONE_ARGS="--depth=1"
          ./scripts/doit.sh

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ./upper/hostdir/binpkgs/*

